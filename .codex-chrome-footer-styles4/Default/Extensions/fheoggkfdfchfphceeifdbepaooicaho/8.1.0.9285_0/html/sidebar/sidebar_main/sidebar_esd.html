<section id="ESD" content-id="ESD">
  <!-- Back button -->
  <div id="esd_back_btn" class="back_btn">
    <img x-mcsrc src="images/sidebar/ic_chevron_small_left.svg">
    <div id="esd_back_btn_message" class="back_btn_message" x-mclocalizedtext="true"></div>
  </div>

  <div class="scroll-padding-wrapper">
    <!-- Sidebar Main Title -->
    <div id="esd_main_title" class="title"></div>

    <div id="esd_main_msg_container"  class="email_msg_container whitebox">
        <div id="esd_main_msg_container_scam" class="email_msg_container_heading">
          <img x-mcsrc src="images/sidebar/ic_email_scam.svg" class="scam_icon" />
          <img x-mcsrc src="images/sidebar/ic_email_safe.svg" class="safe_icon" />
          <div id="esd_main_msg_container_title" class="email_msg_container_heading_title" ></div>
        </div>
        <div id="esd_main_msg_container_expanded" class="email_msg_container_expanded">
            <div id="esd_main_msg_container_expanded_details" class="email_msg_container_expanded_details"></div>
            <div class="email_msg_container_expanded_feedback">
              <div id="esd_main_msg_container_expanded_feedback_text" class="email_msg_container_expanded_feedback_text" x-mclocalizedtext="true"></div>
              <div class="email_msg_container_expanded_feedback_thumbs">
                <img id="email_msg_container_expanded_feedback_thumbs_up" x-mcsrc src="images/sidebar/ic_dfd_feedback_thumb_up.svg" />
                <img id="email_msg_container_expanded_feedback_thumbs_down" x-mcsrc src="images/sidebar/ic_dfd_feedback_thumb_down.svg" />
              </div>
            </div>
            <div id="esd_main_msg_container_expanded_fineprint" class="email_msg_container_expanded_fineprint" x-mclocalizedtext="true"></div>
        </div>
        <div id="esd_main_msg_container_read_more_less" class="email_msg_container_read_more"></div>
    </div>
    
    <!-- Protection message -->
    <div id="esd_main_protection_container" class="protection_container whitebox">
        <div class="protection_container_heading">
          <img id="esd_main_protection_get_icon" class="protection_container_heading_icon" x-mcsrc src="images/sidebar/ic_get_protection_email.svg"></img>
          <img id="esd_main_protection_full_icon" class="protection_container_heading_icon" x-mcsrc src="images/sidebar/ic_full_protection_email.svg"></img>
          <div id="esd_main_protection_heading_title" class="protection_container_heading_title" ></div>
        </div>
        <div id="esd_main_protection_container_text" class="protection_container_text" ></div>
        <div id="esd_main_protection_container_btn_container" class="protection_container_btn_container">
          <div id="esd_main_protection_btn" class="protection_container_btn_container_btn_text" ></div>
          <img x-mcsrc src="images/sidebar/ic_redirect.svg">
        </div>
    </div>
    <!-- Divider -->
    <div class="divider_container">
      <div class="divider_container_divider"></div>
    </div>
    <!-- Toggle Widget -->
    <div id="esd_main_toggle_container" class="toggle_container whitebox">
      <div class="toggle_text">
        <div id="esd_main_toggle_title" class="toggle_title" x-mclocalizedtext="true"></div>
        <div id="esd_main_toggle_message" x-mclocalizedtext="true"></div>
      </div>
      <div class="toggle_btn" id="esd_main_toggle_btn">
      </div>
    </div>

    <!-- Privacy Policy -->
    <div id="esd_main_privacy_policy" class="privacy_policy">
      <a href='https://www.mcafee.com/legal?tab=product' rel='noopener' target='_blank' id="esd_main_privacy_policy_text" class="privacy_policy_text" x-mclocalizedtext="true"></a>
    </div>
    
  </div>
</section>
